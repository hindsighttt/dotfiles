# Font
font_family      JetBrains Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# Liquid glass transparency
background_opacity 0.85
background_blur 1

# No window decorations (Hyprland handles chrome)
hide_window_decorations yes
window_padding_width 4
window_margin_width 0
draw_minimal_borders no

# Cursor
cursor_shape block
cursor_text_color #1e1e1e
cursor #e0e0e0
cursor_blink_interval 0.5

# Scrollback
scrollback_lines 10000
scrollback_pager less +G -R

# Performance
repaint_delay 10
input_delay 3
sync_to_monitor yes

# Monochrome color scheme (Gruvbox Dark Gray variant)
foreground              #e0e0e0
background              #1e1e1e
selection_foreground    #1e1e1e
selection_background    #e0e0e0

# URL styles
url_color               #a0a0a0
url_style               curly

# 16 color palette (grayscale + subtle accents)
color0  #1e1e1e
color1  #ff6b6b
color2  #a0a0a0
color3  #d0d0d0
color4  #808080
color5  #b0b0b0
color6  #909090
color7  #e0e0e0
color8  #505050
color9  #ff8080
color10 #c0c0c0
color11 #e8e8e8
color12 #a0a0a0
color13 #d0d0d0
color14 #b8b8b8
color15 #ffffff

# Tab bar (minimal)
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_min_tabs 2
active_tab_foreground   #1e1e1e
active_tab_background   #e0e0e0
inactive_tab_foreground #a0a0a0
inactive_tab_background #1e1e1e
enable_audio_bell no
