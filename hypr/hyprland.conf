# Minimal Hyprland config
exec-once = /usr/libexec/polkit-mate-authentication-agent-1
exec-once = waybar
#exec-once = kanshi

#Wallpaper
#exec-once = swaybg -i ~/Pictures/Wallpaper/bocchi.png -m fill #bocchi wallpaper
#exec-once = swaybg -i ~/Pictures/Wallpaper/applered.jpg -m fill # apple red wallpaper
exec-once = swaybg -i ~/Pictures/Wallpaper/win11.png -m fill # win11 wallpaper
#exec-once = swaybg -i ~/Pictures/Wallpaper/earth.jpg -m fill # earth wallpaper
#exec-once = swaybg -i ~/Pictures/Wallpaper/fractal.jpg -m fill # fractal wallpaper
#exec-once = swaybg -i ~/Pictures/Wallpaper/pure_black.jpg -m fill # neo wallpaper

exec-once = mkfifo /tmp/wobpipe && tail -f /tmp/wobpipe | wob

# Basic input
input {
    kb_layout = fr,us        # Primary layout first, optional second
    kb_variant = azerty     # Variants for each layout (optional)
    #kb_options = grp:win_space_toggle  # Switch layouts with Super+Space
    follow_mouse = 1
}

# General layout
decoration {
    rounding = 12
    
    blur {
        enabled = true
        size = 7          # Increase for stronger blur (demo uses ~7x7 kernel)
        passes = 1         # More passes = smoother blur
        noise = 0.02       # Subtle grain adds realism
        contrast = 0.9     # Slight desaturation
        brightness = 1   # Darken background slightly
        xray = false       # Don't show windows behind through blur
    }
    
    # Remove shadows as requested earlier
    
    # Subtle border instead
    #border_size = 1
    #col.active_border = rgba(ffffff60)
    #col.inactive_border = rgba(ffffff30)
}

#Monitor scales
# Laptop screen (4K) - scaled to 150%
monitor = eDP-1, 3840x2160@144, 0x0, 2.0

# External monitor (2560x1080) - native scale
monitor = HDMI-A-1, 2560x1080@200, 3840x0, 1.0

# Window rules - no title bars
monitor = , highrr, auto, 1
windowrulev2 = suppressevent maximize, class:.*
#windowrulev2 = opacity 0.90 0.85, class:^(.*)$ #not sure i wanna keep this one
#windowrulev2 = opacity 0.85 0.85, class:^(kitty)$ #opacity for kitty term
layerrule = blur, waybar
layerrule = ignorezero, waybar
layerrule = blur, wofi
layerrule = ignorezero, wofi

# Keybindings
$mod = SUPER
bind = $mod, Return, exec, kitty
bind = $mod, Q, killactive
bind = $mod, M, exit
#bind = $mod, R, exec, wofi --show drun
bind = $mod, SPACE, exec, wofi --show drun --style ~/.config/wofi/style.css --conf ~/.config/wofi/config
bind = SUPER, F12, exec, ~/.config/hypr/toggle-monitor.sh
bind = $mod, A, exec, hyprctl switchxkblayout all next
bind = , Print, exec, hyprshot -m region
bind = , code:99, exec, hyprshot -m region
bind = $mod SHIFT, S, exec, ~/.local/bin/screenshot-menu

# Mouse binds for tiling
bindm = SUPER, mouse:272, movewindow   # Super + Left Click to move/swap
bindm = SUPER, mouse:273, resizewindow # Super + Right Click to resize splits
bindm = SUPER SHIFT, mouse:272, movewindow   # Super+Shift + drag = float and move
bind = SUPER, mouse:276, togglefloating      # Super + Middle Click to toggle float
bind = $mod SHIFT, SPACE, togglefloating   # Super + Shift + Space to toggle float

# Switch to workspace (Super + number)
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move window to workspace (Super + Shift + number)
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Switch to workspace (matches & é " ' ( - è _ ç à keys)
bind = $mod, ampersand, workspace, 1
bind = $mod, eacute, workspace, 2
bind = $mod, quotedbl, workspace, 3
bind = $mod, apostrophe, workspace, 4
bind = $mod, parenleft, workspace, 5
bind = $mod, minus, workspace, 6
bind = $mod, egrave, workspace, 7
bind = $mod, underscore, workspace, 8
bind = $mod, ccedilla, workspace, 9
bind = $mod, agrave, workspace, 10

# Move window to workspace
bind = $mod SHIFT, ampersand, movetoworkspace, 1
bind = $mod SHIFT, eacute, movetoworkspace, 2
bind = $mod SHIFT, quotedbl, movetoworkspace, 3
bind = $mod SHIFT, apostrophe, movetoworkspace, 4
bind = $mod SHIFT, parenleft, movetoworkspace, 5
bind = $mod SHIFT, minus, movetoworkspace, 6
bind = $mod SHIFT, egrave, movetoworkspace, 7
bind = $mod SHIFT, underscore, movetoworkspace, 8
bind = $mod SHIFT, ccedilla, movetoworkspace, 9
bind = $mod SHIFT, agrave, movetoworkspace, 10

# Scroll through existing workspaces with mouse wheel (on desktop)
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# Cycle through workspaces (like GNOME Alt-Tab but for desktops)
bind = $mod, Tab, workspace, previous
